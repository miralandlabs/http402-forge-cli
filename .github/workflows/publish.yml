name: Publish @http402 packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install and build
        working-directory: .
        run: |
          npm ci
          npm run build

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish -w @http402/forge-client --access public
          npm publish -w @http402/forge-cli --access public
          npm publish -w @http402/forge-mcp --access public
